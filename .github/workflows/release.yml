name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.2.0). Used as the release tag, app version, and written into update.txt.'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # A single-OS failure should not cancel the sibling builds or block the release job.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    outputs:
      package_version: ${{ steps.build_details.outputs.package_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/cache
            ~/.dmg-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package.json', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Determine build command and artifact path
        id: build_details
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PRODUCT_NAME=$(node -p "require('./package.json').name")

          # Resolve the version from: workflow_dispatch input, pushed tag, or package.json.
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
          elif [[ "$REF_NAME" == v*.*.* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi

          echo "Using version: $VERSION"
          echo "package_version=${VERSION}" >> $GITHUB_OUTPUT

          # Pin the version into package.json so electron-builder embeds it in the artifact
          # names AND so app.getVersion() returns the correct value inside the app.
          export VERSION
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n');"

          OUTPUT_DIR="dist"

          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --win --x64 --ia32 --publish never" >> $GITHUB_OUTPUT
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.exe" >> $GITHUB_OUTPUT
          elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --mac --x64 --publish never" >> $GITHUB_OUTPUT
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.dmg" >> $GITHUB_OUTPUT
          elif [ "$RUNNER_OS" == "Linux" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --linux --x64 --arm64 --publish never" >> $GITHUB_OUTPUT
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.[Ad]*" >> $GITHUB_OUTPUT
          fi

      - name: Pre-cache arm64 dmg-builder tool (required on ARM64 runner to build any DMG)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          CACHE_DIR="$HOME/Library/Caches/electron-builder/dmg-builder/1.2.0"
          FILE="$CACHE_DIR/dmgbuild-bundle-arm64-75c8a6c.tar.gz"
          mkdir -p "$CACHE_DIR"
          if [ ! -f "$FILE" ]; then
            echo "Downloading arm64 dmg-builder tool from GitHub releases..."
            curl -fL --retry 5 --retry-delay 5 -o "$FILE" \
              "https://github.com/electron-userland/electron-builder-binaries/releases/download/dmg-builder%401.2.0/dmgbuild-bundle-arm64-75c8a6c.tar.gz"
            echo "Cached at: $FILE"
            ls -lh "$FILE"
          else
            echo "Already cached: $FILE"
          fi

      - name: Build application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_DOWNLOAD_TIMEOUT: 120000
          npm_config_fetch_timeout: 120000
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5
        timeout-minutes: 30
        shell: bash
        run: |
          for i in 1 2 3; do
            ${{ steps.build_details.outputs.BUILD_COMMAND }} && break
            echo "Build attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: ${{ steps.build_details.outputs.ARTIFACT_PATH }}
          if-no-files-found: warn

  mac:
    name: Build macOS DMG
    needs: build
    if: always()
    uses: ./.github/workflows/mac-build.yml
    with:
      version: ${{ needs.build.outputs.package_version }}
    permissions:
      contents: write

  create_release:
    name: Create GitHub Release
    needs: [build, mac]
    # Run the release step even if one or more OS builds failed, so the successful
    # artifacts still get published.
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          JOB_VERSION: ${{ needs.build.outputs.package_version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
          elif [ -n "$JOB_VERSION" ]; then
            VERSION="${JOB_VERSION#v}"
          elif [[ "$REF_NAME" == v*.*.* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved release version: $VERSION"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        shell: bash
        run: |
          echo "Contents of artifacts directory:"
          ls -laR artifacts || true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/build-artifact-windows-latest/*
            artifacts/build-artifact-macos-latest/*
            artifacts/build-artifact-ubuntu-latest/*
