name: Mac Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.2.8) — must match an existing release tag v{version}'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  mac-build:
    name: Build and upload macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Pin version in package.json
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          export VERSION
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n');"
          echo "Building version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build app directories (no dmg-builder required)
        run: |
          npx electron-vite build
          npx electron-builder --mac --dir --x64 --publish never
          npx electron-builder --mac --dir --arm64 --publish never

      - name: Package DMGs using hdiutil (built-in macOS tool)
        shell: bash
        run: |
          for ARCH in x64 arm64; do
            APP_DIR="dist/mac"
            [ "$ARCH" = "arm64" ] && APP_DIR="dist/mac-arm64"

            APP_PATH=$(find "$APP_DIR" -maxdepth 1 -name "*.app" | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "ERROR: No .app found in $APP_DIR"
              exit 1
            fi
            echo "Packaging $ARCH: $APP_PATH"

            STAGING=$(mktemp -d)
            ditto "$APP_PATH" "$STAGING/$(basename "$APP_PATH")"
            ln -s /Applications "$STAGING/Applications"

            DMG="dist/apprenticevr-${VERSION}-${ARCH}.dmg"
            hdiutil create \
              -volname "ApprenticeVR VRSrc Edition" \
              -srcfolder "$STAGING" \
              -ov -format UDZO \
              "$DMG"
            rm -rf "$STAGING"
            ls -lh "$DMG"
          done

      - name: Upload DMGs to existing release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"
          echo "Verifying release $TAG exists..."
          gh release view "$TAG" --repo KaladinDMP/apprenticeVrSrc
          for DMG in dist/apprenticevr-${VERSION}-x64.dmg dist/apprenticevr-${VERSION}-arm64.dmg; do
            echo "Uploading $DMG..."
            gh release upload "$TAG" "$DMG" \
              --repo KaladinDMP/apprenticeVrSrc \
              --clobber
          done
          echo "Done."
